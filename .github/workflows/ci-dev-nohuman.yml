# .github/workflows/ci-dev-nohuman.yml
# Dev branch CI — Qwen-NoHuman version line
# Triggers: push to dev / workflow_dispatch
# Builds standalone packages for linux-x64 and win-x64,
# uploads as artifacts + creates GitHub Release.

name: 'Qwen-NoHuman Dev Build & Release'

on:
  push:
    branches:
      - 'dev'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: ''
        type: 'string'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'write'
  actions: 'read'

defaults:
  run:
    shell: 'bash'

jobs:
  version:
    name: 'Compute NoHuman Version'
    runs-on: 'ubuntu-latest'
    outputs:
      tag: '${{ steps.compute.outputs.tag }}'
      version: '${{ steps.compute.outputs.version }}'
    steps:
      - uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Compute version'
        id: 'compute'
        run: |
          LATEST_TAG=$(git tag -l 'Qwen-NoHuman-v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=1
          else
            TAG_NUM=$(echo "$LATEST_TAG" | sed 's/Qwen-NoHuman-v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_NUM"
            case "${{ inputs.version_bump }}" in
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              *) PATCH=$((PATCH + 1)) ;;
            esac
          fi
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="Qwen-NoHuman-v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "computed: ${TAG}"

  build:
    name: 'Build (${{ matrix.target }})'
    needs: 'version'
    runs-on: '${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: 'linux-x64'
            os: 'ubuntu-latest'
            node-target: 'linux-x64'
            ext: 'tar.gz'
          - target: 'win-x64'
            os: 'windows-latest'
            node-target: 'win-x64'
            ext: 'zip'
    env:
      NOHUMAN_VERSION: '${{ needs.version.outputs.version }}'
    steps:
      - uses: 'actions/checkout@v4'

      - uses: 'actions/setup-node@v4'
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci --prefer-offline --no-audit --progress=false'

      - name: 'Set NoHuman version'
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = process.env.NOHUMAN_VERSION;
            pkg.displayName = 'Qwen-NoHuman';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: 'Build'
        run: 'npm run build'

      - name: 'Run tests'
        run: 'npm run test:ci'
        env:
          NO_COLOR: 'true'

      - name: 'Bundle CLI'
        run: 'npm run bundle'

      - name: 'Build standalone package'
        run: |
          node scripts/build-standalone-release.js --target=${{ matrix.node-target }} --version=${{ needs.version.outputs.version }}

      - name: 'Upload artifact'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'qwen-nohuman-${{ matrix.target }}'
          path: 'release/*.${{ matrix.ext }}'
          retention-days: 30

  release:
    name: 'Create GitHub Release'
    needs: ['version', 'build']
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - uses: 'actions/download-artifact@v4'
        with:
          path: 'artifacts'
          merge-multiple: true

      - name: 'List artifacts'
        run: 'ls -laR artifacts/'

      - name: 'Create Release'
        uses: 'softprops/action-gh-release@v2'
        with:
          tag_name: '${{ needs.version.outputs.tag }}'
          name: 'Qwen-NoHuman ${{ needs.version.outputs.version }}'
          body: |
            # Qwen-NoHuman v${{ needs.version.outputs.version }}

            Dev 分支独立版本。基于 [QwenLM/qwen-code](https://github.com/QwenLM/qwen-code) + fork 热补丁。

            ### 安装

            **Windows:**
            ```powershell
            Expand-Archive qwen-nohuman-win-x64.zip -DestinationPath .\qwen-nohuman
            .\qwen-nohuman\qwen-code.exe --help
            ```

            **Linux:**
            ```bash
            tar -xzf qwen-nohuman-linux-x64.tar.gz
            ./qwen-nohuman --help
            ```

            ### 关联
            - Fork: [aspnmy/qwen-code](https://github.com/aspnmy/qwen-code) (dev branch)
            - Changelog: 见 dev 分支 README
          draft: false
          prerelease: false
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
